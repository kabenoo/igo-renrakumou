<script>

};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged((user) => {
  if (!user) {
    location.href = "index.html";
  }
});

function logout() {
  auth.signOut().then(() => {
    location.href = "login.html";
  }).catch((error) => {
    alert("ログアウト失敗：" + error.message);
  });
}
</script>
