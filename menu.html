<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>メニュー</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-size: 18px;        /* 文字を大きく（約3倍） */
  background-color: #e8f5e9; /* 薄い緑 */
  margin: 0;
  padding: 10px;
}

h2 {
  font-size: 28px;
}

button {
  width: 90%;
  padding: 18px;
  font-size: 18px;
  margin: 10px 0;
  border-radius: 10px;
}

input, textarea, select {
  width: 95%;
  font-size: 16px;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
}

table {
  width: 100%;
  font-size: 16px;
  border-collapse: collapse;
}

td, th {
  padding: 8px;
}
</style>
</head>

<body>

<h2>ネット囲碁教室<br>メニュー</h2>

<button onclick="location.href='attendance.html'">出欠連絡</button><br>
<button onclick="location.href='chat.html'">チャット</button><br>
<button onclick="location.href='attendance-list.html'">出欠一覧</button><br>
<button onclick="logout()">ログアウト</button>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyDradhbemdJWhKRzJDpD0k5g_xSX-C3ccE",
  authDomain: "igo-renrakumou.firebaseapp.com",
  projectId: "igo-renrakumou",
  storageBucket: "igo-renrakumou.firebasestorage.app",
  messagingSenderId: "21430951468",
  appId: "1:21430951468:web:7513e4528ac1592f41fb89"
};

firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();

auth.onAuthStateChanged((user) => {
  if (!user) {
    location.href = "index.html";
  }
});

function logout() {
  auth.signOut().then(() => {
    location.href = "./";
  }).catch((error) => {
    alert("ログアウト失敗：" + error.message);
  });
}
</script>

</body>
</html>
