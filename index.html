<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>ネット囲碁教室ログイン</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
  font-size: 18px;        /* 文字を大きく（約3倍） */
  background-color: #e8f5e9; /* 薄い緑 */
  margin: 0;
  padding: 10px;
}

h2 {
  font-size: 28px;
}

button {
  width: 90%;
  padding: 18px;
  font-size: 18px;
  margin: 10px 0;
  border-radius: 10px;
}

input, textarea, select {
  width: 95%;
  font-size: 16px;
  padding: 10px;
  margin: 8px 0;
  border-radius: 8px;
}

table {
  width: 100%;
  font-size: 16px;
  border-collapse: collapse;
}

td, th {
  padding: 8px;
}
</style>

</head>

<body>

<h2>ログイン</h2>

<input type="email" id="email" placeholder="メールアドレス"><br><br>
<input type="password" id="password" placeholder="パスワード"><br><br>

<button onclick="login()">ログイン</button>

<p id="msg"></p>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";

// あなたのFirebase設定（そのまま使用）
const firebaseConfig = {
  apiKey: "AIzaSyDradhbemdJWhKRzJDpD0k5g_xSX-C3ccE",
  authDomain: "igo-renrakumou.firebaseapp.com",
  projectId: "igo-renrakumou",
  storageBucket: "igo-renrakumou.firebasestorage.app",
  messagingSenderId: "21430951468",
  appId: "1:21430951468:web:7513e4528ac1592f41fb89"
};

// 初期化
const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

// ログイン処理
window.login = function() {
  const email = document.getElementById("email").value;
  const password = document.getElementById("password").value;

  signInWithEmailAndPassword(auth, email, password)
   .then(() => {
    window.location.href = "menu.html";
  })
    .catch((error) => {
      document.getElementById("msg").innerText = "ログイン失敗：" + error.message;
    });
}
</script>

</body>
</html>
